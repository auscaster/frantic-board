name: delivery-artifact-linter-evidence

on:
  workflow_dispatch:
  push:
    branches:
      - codex/delivery-artifact-linter

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run deterministic linter fixtures
        run: node scripts/test-delivery-artifact-linter.mjs

      - name: Install runx sandbox dependency
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bubblewrap
          bwrap --version

      - name: Download and verify runx 0.6.8
        shell: bash
        run: |
          set -euo pipefail
          base=https://github.com/runxhq/runx/releases/download/cli-v0.6.8
          archive=runx-0.6.8-x86_64-unknown-linux-musl.tar.gz
          curl -fsSLO --retry 5 --retry-all-errors --retry-delay 2 --connect-timeout 20 "$base/$archive"
          curl -fsSLO --retry 5 --retry-all-errors --retry-delay 2 --connect-timeout 20 "$base/$archive.sha256"
          sha256sum --check "$archive.sha256"
          mkdir -p .runx-bin
          tar -xzf "$archive" -C .runx-bin
          find .runx-bin -type f -name runx -exec chmod +x {} \;
          find .runx-bin -type f -name runx -print -quit > .runx-bin-path
          "$(cat .runx-bin-path)" --version | tee evidence/delivery-artifact-linter/runx-version.txt

      - name: Run governed harness and seal receipts
        shell: bash
        env:
          RUNX_RECEIPT_SIGN_KID: github-actions-delivery-linter
          RUNX_RECEIPT_SIGN_ISSUER_TYPE: ci
        run: |
          set -euo pipefail
          export RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64="$(openssl rand -base64 32 | tr -d '\n')"
          export RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64="$(node -e 'const {createPrivateKey,createPublicKey}=require("node:crypto");const seed=Buffer.from(process.env.RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64,"base64");const prefix=Buffer.from("302e020100300506032b657004220420","hex");const key=createPrivateKey({key:Buffer.concat([prefix,seed]),format:"der",type:"pkcs8"});const pub=createPublicKey(key).export({format:"der",type:"spki"});process.stdout.write(pub.subarray(-32).toString("base64"));')"
          printf '%s\n' "$RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64" > evidence/delivery-artifact-linter/receipt-public-key-base64.txt
          mkdir -p .receipts
          sandbox_source="$GITHUB_WORKSPACE/evidence/delivery-artifact-linter"
          path="$sandbox_source"
          while [ "$path" != "/" ]; do
            sudo chmod o+x "$path"
            path="$(dirname "$path")"
          done
          set +e
          sudo --preserve-env=RUNX_RECEIPT_SIGN_KID,RUNX_RECEIPT_SIGN_ISSUER_TYPE,RUNX_RECEIPT_SIGN_ED25519_SEED_BASE64 \
            "$(cat .runx-bin-path)" harness evidence/delivery-artifact-linter \
            --receipt-dir "$GITHUB_WORKSPACE/.receipts" \
            --json | tee evidence/delivery-artifact-linter/harness-output.json
          status=${PIPESTATUS[0]}
          sudo chown -R "$(id -u):$(id -g)" .receipts
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          set -e
          receipt_id="$(node -e 'const h=require("./evidence/delivery-artifact-linter/harness-output.json");process.stdout.write(h.receipt_ids[0])')"
          RUNX_RECEIPT_VERIFY_KID="$RUNX_RECEIPT_SIGN_KID" \
          RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64="$RUNX_RECEIPT_VERIFY_ED25519_PUBLIC_KEY_BASE64" \
            "$(cat .runx-bin-path)" verify --receipt ".receipts/${receipt_id}.json" --json \
            | tee evidence/delivery-artifact-linter/verification.json

      - name: Pack sealed receipts for portable download
        if: always()
        shell: bash
        run: |
          if [ -d .receipts ]; then
            tar -czf evidence/delivery-artifact-linter/receipts.tar.gz -C .receipts .
          fi

      - name: Upload public evidence packet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delivery-artifact-linter-evidence
          path: |
            evidence/delivery-artifact-linter/runx-version.txt
            evidence/delivery-artifact-linter/harness-output.json
            evidence/delivery-artifact-linter/receipt-public-key-base64.txt
            evidence/delivery-artifact-linter/verification.json
            evidence/delivery-artifact-linter/receipts.tar.gz
          if-no-files-found: warn
          retention-days: 7
