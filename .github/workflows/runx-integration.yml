name: Runx Integration
on:
  issues:
    types: [opened, labeled]

jobs:
  notify-runx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Send notification to runx
        run: |
          curl -X POST https://runx.example.com/notify \
            -H "Content-Type: application/json" \
            -d '{"message": "New issue: ${{ github.event.issue.title }}", "repo": "${{ github.repository }}"}'
        env:
          RUNX_TOKEN: ${{ secrets.RUNX_TOKEN }}
