name: Deploy Sourcey API docs to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/sourcey-frantic-api/**"
      - ".github/workflows/sourcey-docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "sourcey-docs-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/sourcey-frantic-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/sourcey-frantic-api/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build and verify Sourcey site
        run: npm run check
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/sourcey-frantic-api/site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
