rules:
  - id: "access-control"
    description: "Ensure proper access control is in place"
    severity: "high"
    check: "check_access_control"
  - id: "data-encryption"
    description: "Verify data encryption at rest and in transit"
    severity: "critical"
    check: "check_encryption"
  - id: "audit-logging"
    description: "Ensure audit logging is enabled"
    severity: "medium"
    check: "check_audit_logging"
  - id: "patching"
    description: "Check that systems are up-to-date with patches"
    severity: "high"
    check: "check_patching"